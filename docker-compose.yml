version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kasir_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kasir_saas
      POSTGRES_USER: kasir
      POSTGRES_PASSWORD: kasirpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasir -d kasir_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kasir_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kasir:kasirpassword123@postgres:5432/kasir_saas
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      WEBAPP_URL: ${WEBAPP_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kasir_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://backend:3001}
      NEXT_PUBLIC_ADMIN_USERNAME: ${ADMIN_USERNAME}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
